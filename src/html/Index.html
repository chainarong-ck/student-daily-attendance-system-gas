<!doctype html>
<html lang="th">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <title>ระบบบันทึกการเข้าเรียนรายวัน</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wdth,wght@62.5..100,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      :root {
        --app-font-family:
          "Noto Sans Thai", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        --app-bg: #f5f7fb;
        --app-panel: #ffffff;
        --app-text: #1f2937;
        --app-muted: #6b7280;
        --app-border: #d8dee9;
        --app-primary: #0f766e;
        --app-blue: #2563eb;
        --app-amber: #b45309;
        --bs-body-font-family: var(--app-font-family);
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--app-bg);
        color: var(--app-text);
        font-family: var(--app-font-family);
      }

      button,
      input,
      optgroup,
      textarea,
      select {
        font-family: var(--app-font-family);
      }

      .app-shell {
        min-height: 100vh;
      }

      .topbar {
        background: #ffffff;
        border-bottom: 1px solid var(--app-border);
      }

      .topbar-inner {
        width: min(100%, 1120px);
        min-height: 64px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand-icon {
        display: grid;
        place-items: center;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: #e6f4f1;
        color: var(--app-primary);
        flex: 0 0 auto;
      }

      .brand-name {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 750;
        letter-spacing: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .page-main {
        width: min(100%, 1120px);
        margin: 0 auto;
        padding: 28px 24px 40px;
      }

      .status-panel {
        background: var(--app-panel);
        border: 1px solid var(--app-border);
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 18px 45px rgba(31, 41, 55, 0.06);
      }

      .status-title {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 750;
        letter-spacing: 0;
      }

      .status-subtitle {
        margin: 8px 0 0;
        color: var(--app-muted);
        line-height: 1.6;
      }

      .status-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 22px;
      }

      .status-item {
        border: 1px solid var(--app-border);
        border-radius: 8px;
        padding: 16px;
        background: #fbfdff;
        min-height: 116px;
      }

      .status-item-icon {
        display: inline-grid;
        place-items: center;
        width: 36px;
        height: 36px;
        border-radius: 8px;
        margin-bottom: 12px;
      }

      .status-item-icon.ready {
        background: #e6f4f1;
        color: var(--app-primary);
      }

      .status-item-icon.config {
        background: #eef4ff;
        color: var(--app-blue);
      }

      .status-item-icon.session {
        background: #fff7ed;
        color: var(--app-amber);
      }

      .status-label {
        margin: 0;
        color: var(--app-muted);
        font-size: 0.92rem;
      }

      .status-value {
        margin: 3px 0 0;
        font-weight: 700;
      }

      @media (max-width: 768px) {
        .topbar-inner {
          padding: 0 16px;
        }

        .page-main {
          padding: 18px 16px 28px;
        }

        .status-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="brand">
            <div class="brand-icon">
              <i class="bi bi-calendar2-check" aria-hidden="true"></i>
            </div>
            <h1 class="brand-name">ระบบบันทึกการเข้าเรียนรายวัน</h1>
          </div>
          <button
            id="logoutButton"
            type="button"
            class="btn btn-outline-secondary btn-sm"
          >
            <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
            ออกจากระบบ
          </button>
        </div>
      </header>

      <main class="page-main">
        <section class="status-panel" aria-labelledby="statusTitle">
          <h2 id="statusTitle" class="status-title">สถานะระบบ</h2>
          <p class="status-subtitle">
            เข้าสู่ระบบแล้ว และการตั้งค่าพื้นฐานพร้อมใช้งาน
          </p>

          <div class="status-grid">
            <div class="status-item">
              <span class="status-item-icon ready">
                <i class="bi bi-check2-circle" aria-hidden="true"></i>
              </span>
              <p class="status-label">ระบบ</p>
              <p class="status-value">พร้อมใช้งาน</p>
            </div>

            <div class="status-item">
              <span class="status-item-icon config">
                <i class="bi bi-table" aria-hidden="true"></i>
              </span>
              <p class="status-label">สเปรดชีตหลัก</p>
              <p class="status-value">ตั้งค่าแล้ว</p>
            </div>

            <div class="status-item">
              <span class="status-item-icon session">
                <i class="bi bi-shield-check" aria-hidden="true"></i>
              </span>
              <p class="status-label">เซสชัน</p>
              <p class="status-value">ใช้งานอยู่</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script>
      (function () {
        const appUrl = "<?= appUrl ?>";
        const authToken = "<?= authToken ?>";
        const logoutButton = document.getElementById("logoutButton");

        logoutButton.addEventListener("click", function () {
          logoutButton.disabled = true;
          logoutButton.innerHTML =
            '<span class="spinner-border spinner-border-sm" aria-hidden="true"></span> กำลังออกจากระบบ';

          google.script.run
            .withSuccessHandler(function (result) {
              if (result && result.redirectUrl) {
                window.top.location.href = result.redirectUrl;
                return;
              }
            })
            .withFailureHandler(function (error) {
              logoutButton.disabled = false;
              logoutButton.innerHTML =
                '<i class="bi bi-box-arrow-right" aria-hidden="true"></i> ออกจากระบบ';
              alert(
                error && error.message
                  ? error.message
                  : "ไม่สามารถออกจากระบบได้ กรุณาลองใหม่อีกครั้ง",
              );
            })
            ._logout(authToken);
        });
      })();
    </script>
  </body>
</html>
